theme = "tokyonight"

[editor]
soft-wrap.enable = true
line-number = "relative"
mouse = true
cursorcolumn = true
cursorline = true
continue-comments = false
bufferline = "always"

[editor.cursor-shape]
insert = "bar"
normal = "block"
select = "underline"

[keys.insert]
'C-c' = "normal_mode"

[keys.normal]
H = "goto_previous_buffer"
L = "goto_next_buffer"
"ret" = "goto_word"
"C-r" = ":reload-all"

[keys.normal.space]
q.b = ":buffer-close"
q.o = ":buffer-close-others"
c.r = ":config-reload"
c.o = ":config-open"


 
